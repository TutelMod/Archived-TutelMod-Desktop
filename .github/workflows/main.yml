name: Build

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 6 * * *'

env:
  NODE_ENV: 'production'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- Checkout ---
      - name: Checkout
        uses: actions/checkout@v4

      # --- Generate Dynamic Cache Key Components ---
      - name: Get current week
        run: echo "WEEK_STAMP=$(date +'%Y-%U')" >> $GITHUB_ENV

      # --- Generate Release Metadata ---
      - name: Generate release metadata
        run: |
          echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "TIMESTAMP_TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
          echo "RELEASE_NAME=Build #${{ github.run_number }} — ${{ github.workflow }} (${{ github.run_id }}) — $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV
          echo "RELEASE_TAG=build-${{ github.run_id }}-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      # --- Cache APT packages ---
      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: apt-cache
          key: apt-cache-${{ runner.os }}-wine-${{ env.WEEK_STAMP }}
          restore-keys: |
            apt-cache-${{ runner.os }}-wine-
            apt-cache-${{ runner.os }}-

      # --- Install system dependencies ---
      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          
          mkdir -p apt-cache
          
          sudo apt-get install -y -d -o dir::cache::archives="$(pwd)/apt-cache" git curl jq zip unzip wine32 wine64
          sudo dpkg -i apt-cache/*.deb || sudo apt-get install -f -y
          sudo chown -R runner:runner apt-cache

      # --- Install Bun ---
      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      # --- Install Node.js ---
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      # --- Clone Standalone Repos and Cache ---

      # TutelMod Extension Gallery
      - name: Clone TutelMod Extension Gallery
        run: git clone --depth=1 https://github.com/TutelMod/TutelMod-ExtensionsGallery.git

      - name: Install TutelMod ext gallery deps
        run: |
          cd TutelMod-ExtensionsGallery
          bun i
          bun run build
      
      # PenguinMod Extension Gallery
      - name: Clone PenguinMod Extension Gallery
        run: git clone --depth=1 https://github.com/PenguinMod/PenguinMod-ExtensionsGallery.git

      - name: Install PenguinMod ext gallery deps
        run: |
          cd PenguinMod-ExtensionsGallery
          bun i
          bun run build

      # TurboWarp Extension Gallery
      - name: Clone TurboWarp Extension Gallery
        run: git clone --depth=1 https://github.com/TurboWarp/extensions.git TurboWarp-ExtensionsGallery

      - name: Cache TurboWarp node_modules
        uses: actions/cache@v3
        with:
          path: TurboWarp-ExtensionsGallery/node_modules
          key: node-modules-turbowarp-${{ env.WEEK_STAMP }}
          restore-keys: |
            node-modules-turbowarp-

      - name: Install TurboWarp deps
        run: |
          cd TurboWarp-ExtensionsGallery
          bun i
          bun run build

      # SharkPool Extension Gallery
      - name: Clone SharkPool Extension Gallery
        run: git clone --depth=1 https://github.com/SharkPool-SP/SharkPools-Extensions.git

      # TutelMod Home
      - name: Clone TutelMod Home
        run: git clone --depth=1 https://github.com/TutelMod/TutelMod-Home.git

      - name: Cache TutelMod Home node_modules
        uses: actions/cache@v3
        with:
          path: TutelMod-Home/node_modules
          key: node-modules-penguinmod-home-${{ env.WEEK_STAMP }}
          restore-keys: |
            node-modules-penguinmod-home-

      - name: Install TutelMod Home deps
        run: |
          cd TutelMod-Home
          mv .env.template .env
          bun i

      # --- Clone TutelMod GUI Main Repository ---
      - name: Clone TutelMod GUI
        run: git clone --depth=1 https://github.com/TutelMod/tutelmod.github.io.git

      # --- CONSOLIDATED GUI & SUBMODULES CACHE ---
      - name: Cache GUI and Submodule node_modules
        id: gui-cache
        uses: actions/cache@v3
        with:
          path: |
            tutelmod.github.io/node_modules
            tutelmod.github.io/TutelMod-Vm/node_modules
            tutelmod.github.io/TutelMod-Blocks/node_modules
            penguinmod.github.io/PenguinMod-Render/node_modules
            tutelmod.github.io/TutelMod-Paint/node_modules
          key: node-modules-penguinmod-combined-${{ hashFiles('tutelmod.github.io/package.json') }}-${{ env.WEEK_STAMP }}
          restore-keys: |
            node-modules-penguinmod-combined-${{ hashFiles('tutelmod.github.io/package.json') }}-
            node-modules-penguinmod-combined-

      # --- Process Submodules and Run Updates ---
      - name: Setup GUI Dependencies & Submodules
        run: |
          cd tutelmod.github.io
          
          git clone --depth=1 https://github.com/TutelMod/TutelMod-Vm.git
          git clone --depth=1 -b develop-builds https://github.com/TutelMod/TutelMod-Blocks.git
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Render.git
          git clone --depth=1 https://github.com/TutelMod/TutelMod-Paint.git
          
          if [ -d "node_modules/scratch-vm/node_modules" ]; then
            mv node_modules/scratch-vm/node_modules TutelMod-Vm/
          fi
          if [ -d "node_modules/scratch-blocks/node_modules" ]; then
            mv node_modules/scratch-blocks/node_modules TutelMod-Blocks/
          fi
          if [ -d "node_modules/scratch-render/node_modules" ]; then
            mv node_modules/scratch-render/node_modules PenguinMod-Render/
          fi
          if [ -d "node_modules/scratch-paint/node_modules" ]; then
            mv node_modules/scratch-paint/node_modules TutelMod-Paint/
          fi
          
          bun i
          cd TutelMod-Vm && bun i && cd ..
          cd TutelMod-Blocks && bun i && cd ..
          cd PenguinMod-Render && rm -f package-lock.json && bun i && cd ..
          cd TutelMod-Paint && bun i && cd ..
          
          rm -rf node_modules/scratch-vm && mv TutelMod-Vm node_modules/scratch-vm
          rm -rf node_modules/scratch-blocks && mv TutelMod-Blocks node_modules/scratch-blocks
          rm -rf node_modules/scratch-render && mv PenguinMod-Render node_modules/scratch-render
          rm -rf node_modules/scratch-paint && mv TutelMod-Paint node_modules/scratch-paint

      # --- Build Web App ---
      - name: Build TutelMod Web
        run: |
          cd tutelmod.github.io
          bun run build
          cp -R build ../app
          cd ..
          rm -rf app/package.json app/node_modules
          cd TutelMod-Home
          bun run build
          cp -R public ../app
          cd ..
          cp -R SharkPools-Extensions app/
          cp -R TurboWarp-ExtensionsGallery/build app/TurboWarp-ExtensionsGallery
          cp -R PenguinMod-ExtensionsGallery/public app/PenguinMod-ExtensionsGallery
          cp -R TutelMod-ExtensionsGallery/public app/TutelMod-ExtensionsGallery

      # --- Install prod-only deps ---
      - name: Install production deps
        run: |
          rm -rf node_modules
          mkdir node_modules
          bun i --omit=dev

      # --- Build Electron App ---
      - name: Build Electron App
        run: npx electron-builder --linux AppImage deb rpm --win nsis --publish never

      # --- Zip artifacts ---
      - name: Zip linux-unpacked
        run: zip -r builds/linux-unpacked.zip builds/linux-unpacked

      - name: Zip win-unpacked
        run: zip -r builds/win-unpacked.zip builds/win-unpacked

      # --- Create GitHub Release ---
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          release_name: ${{ env.RELEASE_NAME }}
          body: |
            ## Automated Build

            | Field        | Value |
            |-------------|-------|
            | **Run ID**   | `${{ github.run_id }}` |
            | **Run #**    | `${{ github.run_number }}` |
            | **Workflow** | `${{ github.workflow }}` |
            | **Trigger**  | `${{ github.event_name }}` |
            | **Branch**   | `${{ github.ref_name }}` |
            | **Commit**   | `${{ github.sha }}` |
            | **Built at** | `${{ env.TIMESTAMP }}` |
          draft: false
          prerelease: true

      # --- Capture artifact filenames ---
      - name: Capture artifact filenames
        run: |
          DEB=$(ls builds/*.deb | head -1)
          RPM=$(ls builds/*.rpm | head -1)
          APPIMAGE=$(ls builds/*.AppImage | head -1)
          EXE=$(ls builds/*.exe | head -1)

          echo "DEB_PATH=$DEB" >> $GITHUB_ENV
          echo "DEB_NAME=$(basename "$DEB")" >> $GITHUB_ENV
          echo "RPM_PATH=$RPM" >> $GITHUB_ENV
          echo "RPM_NAME=$(basename "$RPM")" >> $GITHUB_ENV
          echo "APPIMAGE_PATH=$APPIMAGE" >> $GITHUB_ENV
          echo "APPIMAGE_NAME=$(basename "$APPIMAGE")" >> $GITHUB_ENV
          echo "EXE_PATH=$EXE" >> $GITHUB_ENV
          echo "EXE_NAME=$(basename "$EXE")" >> $GITHUB_ENV

      - name: Upload .deb release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.DEB_PATH }}
          asset_name: ${{ env.DEB_NAME }}
          asset_content_type: application/vnd.debian.binary-package

      - name: Upload .rpm release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.RPM_PATH }}
          asset_name: ${{ env.RPM_NAME }}
          asset_content_type: application/x-rpm

      - name: Upload AppImage release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.APPIMAGE_PATH }}
          asset_name: ${{ env.APPIMAGE_NAME }}
          asset_content_type: application/octet-stream

      - name: Upload .exe release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.EXE_PATH }}
          asset_name: ${{ env.EXE_NAME }}
          asset_content_type: application/octet-stream

      - name: Upload linux-unpacked.zip
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: builds/linux-unpacked.zip
          asset_name: linux-unpacked.zip
          asset_content_type: application/zip

      - name: Upload win-unpacked.zip
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: builds/win-unpacked.zip
          asset_name: win-unpacked.zip
          asset_content_type: application/zip
